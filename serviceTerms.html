  <body>
    <select id="select" onchange="changeHtml()">
      <option value="./serviceTerms_231201.html" selected>
        2023년 12월 01일
      </option>
    </select>

    <h5 class="strong">스마트 안심번호 서비스이용약관</h5>

    <div id="contents"></div>
  </body>
</html>

<script>
  // HTML 파일을 변경하는 함수
  function changeHtml() {
    const selectedHtml = document.getElementById("select").value;

    // XMLHttpRequest를 이용하여 선택한 HTML 파일을 비동기적으로 로드
    const xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function () {
      if (xhr.readyState == 4 && xhr.status == 200) {
        // 로드가 완료되면 content div에 내용을 삽입
        document.getElementById("contents").innerHTML = xhr.responseText;
      }
    };
    xhr.open("GET", selectedHtml, true);
    xhr.send();
  }

  // 페이지 로드 시 초기 HTML 파일 로드
  window.onload = function () {
    changeHtml();
  };

  // select 요소의 값이 변경될 때마다 changeHtml 함수 호출
  document.getElementById("select").addEventListener("change", changeHtml);
</script>
